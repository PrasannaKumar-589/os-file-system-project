<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Access Logger | Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>Logger.OS</span>
            </div>
            <nav>
                <div class="nav-item active">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor"/></svg>
                    Dashboard
                </div>
                <div class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" fill="currentColor"/></svg>
                    Logs
                </div>
            </nav>
            <div class="system-status">
                <div class="status-indicator online"></div>
                <span>Kernel Monitor Active</span>
            </div>
        </aside>

        <main class="content">
            <header>
                <div class="title-group">
                    <h1>File Access Dashboard</h1>
                    <p>Real-time system-level monitoring via inotify API</p>
                </div>
                <div class="actions">
                    <input type="file" id="logFileInput" style="display: none;" accept=".txt">
                    <button id="uploadBtn" class="primary-btn" style="background: var(--green); margin-right: 10px;">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z" fill="currentColor"/></svg>
                        Upload log
                    </button>
                    <button id="refreshBtn" class="primary-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
                        Simulate Event
                    </button>
                </div>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <span class="label">Total Events</span>
                    <h2 id="totalEvents">0</h2>
                    <div class="trend positive">+12% vs last hr</div>
                </div>
                <div class="stat-card">
                    <span class="label">Read Access</span>
                    <h2 id="readEvents" style="color: var(--blue);">0</h2>
                    <div class="mini-bar"><div class="fill" style="width: 45%; background: var(--blue);"></div></div>
                </div>
                <div class="stat-card">
                    <span class="label">Write/Modify</span>
                    <h2 id="writeEvents" style="color: var(--orange);">0</h2>
                    <div class="mini-bar"><div class="fill" style="width: 30%; background: var(--orange);"></div></div>
                </div>
                <div class="stat-card">
                    <span class="label">Open Events</span>
                    <h2 id="openEvents" style="color: var(--green);">0</h2>
                    <div class="mini-bar"><div class="fill" style="width: 25%; background: var(--green);"></div></div>
                </div>
            </section>

            <section class="log-table-container">
                <div class="table-header">
                    <h3>Recent Activity</h3>
                    <span class="badge">Live</span>
                </div>
                <table id="logTable">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Target File</th>
                            <th>Event Type</th>
                            <th>User Context</th>
                        </tr>
                    </thead>
                    <tbody id="logBody">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
