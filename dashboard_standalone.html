<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Access Logger | Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --sidebar: #12151c;
            --card: #1c212b;
            --text-main: #e6edf3;
            --text-dim: #848d97;
            --accent: #2f81f7;
            --blue: #38bdf8;
            --green: #4ade80;
            --orange: #fb923c;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; margin-bottom: 40px; font-size: 1.2rem; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #79c0ff); border-radius: 8px; }
        
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .primary-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 24px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-card h2 { font-size: 2.2rem; margin: 12px 0; }

        .log-table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px 24px; color: var(--text-dim); background: rgba(255,255,255,0.02); }
        td { padding: 16px 24px; border-top: 1px solid var(--border); }
        
        .event-tag { padding: 4px 10px; border-radius: 6px; font-family: 'JetBrains Mono'; font-size: 0.8rem; font-weight: 600; }
        .tag-open { background: rgba(74, 222, 128, 0.1); color: var(--green); }
        .tag-read { background: rgba(56, 189, 248, 0.1); color: var(--blue); }
        .tag-modify { background: rgba(251, 146, 60, 0.1); color: var(--orange); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .status-indicator { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><div class="logo-icon"></div><span>Logger.OS</span></div>
        <div style="margin-top: auto; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px; display: flex; align-items: center; gap: 10px; font-size: 0.85rem;">
            <div class="status-indicator"></div> Kernel Monitor Active
        </div>
    </aside>

    <main class="content">
        <header>
            <div><h1>System Analytics</h1><p style="color: var(--text-dim)">Visualizing kernel file events</p></div>
            <div style="display: flex; gap: 10px;">
                <input type="file" id="logFileInput" style="display: none;" accept=".txt">
                <button id="uploadBtn" class="primary-btn" style="background: var(--green);">
                    Upload Real Log
                </button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card"><span>Total Events</span><h2 id="total">0</h2></div>
            <div class="stat-card"><span>Reads</span><h2 id="reads" style="color: var(--blue)">0</h2></div>
            <div class="stat-card"><span>Modifies</span><h2 id="writes" style="color: var(--orange)">0</h2></div>
            <div class="stat-card"><span>Opens</span><h2 id="opens" style="color: var(--green)">0</h2></div>
        </section>

        <div class="log-table-container">
            <table>
                <thead><tr><th>Timestamp</th><th>File</th><th>Event</th><th>User</th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        function renderLogs(logs) {
            const body = document.getElementById('logBody');
            body.innerHTML = '';
            let r=0, w=0, o=0;
            logs.forEach(log => {
                if (log.event === 'READ') r++;
                if (log.event === 'MODIFY') w++;
                if (log.event === 'OPEN' || log.event.includes('CREATE')) o++;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: var(--text-dim); font-family: 'JetBrains Mono'">${log.time}</td>
                    <td><b>${log.file}</b></td>
                    <td><span class="event-tag tag-${log.event.toLowerCase().split('/')[0]}">${log.event}</span></td>
                    <td>${log.user}</td>
                `;
                body.appendChild(tr);
            });
            document.getElementById('total').innerText = logs.length;
            document.getElementById('reads').innerText = r;
            document.getElementById('writes').innerText = w;
            document.getElementById('opens').innerText = o;
        }

        // Auto-Sync Logic for Local Server
        function syncFromServer() {
            fetch('/file_access_log.txt?t=' + Date.now())
                .then(response => response.text())
                .then(text => {
                    const lines = text.split('\n');
                    const parsed = [];
                    lines.forEach(line => {
                        const regex = /\[(.*?)\] File: (.*?) \| Event: (.*?) \| User: (.*?)(?: \(UID: (\d+)\))?$/;
                        const match = line.match(regex);
                        if (match) parsed.unshift({ time: match[1], file: match[2], event: match[3], user: match[4] });
                    });
                    renderLogs(parsed);
                })
                .catch(err => console.log("Waiting for server..."));
        }

        // Start syncing immediately when served from Python
        if (window.location.protocol !== 'file:') {
            document.getElementById('uploadBtn').innerText = "📡 Real-Time Sync: ON";
            document.getElementById('uploadBtn').style.background = "#238636";
            setInterval(syncFromServer, 1000);
            syncFromServer();
        }

        // Fallback for manual file upload
        let selectedFile = null;
        document.getElementById('uploadBtn').addEventListener('click', () => {
            if (window.location.protocol === 'file:') {
                document.getElementById('logFileInput').click();
            }
        });
    </script>
</body>
</html>
